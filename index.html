<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>szur999 // 六</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="favicon.png">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <nav>
        <div class="nav-container">
            <h2 class="logo">szur999</h2>
            <ul>
                <li id="nav-home" class="active"><a href="#" onclick="navigate('home')">home</a></li>
                <li id="nav-about"><a href="#" onclick="navigate('about')">about</a></li>
            </ul>
        </div>
    </nav>

    <main id="content">   <!-- removed dragscroll class -->
        <!-- HOME SECTION -->
        <section id="home" class="active-section">
            <div class="chat-container">
                <div class="chat-line">
                    <span class="name">szur999</span>
                </div>
                <div class="chat-line">
                    <span class="name">yo?</span>
                </div>
                
                <!-- MUSIC PLAYER + VISUALIZER -->
                <div class="music-section">
                    <h2 class="section-subtitle">now playing</h2>
                    <div class="music-player">
                        <div id="current-song">mineral - parking lot</div>
                        
                        <!-- Canvas visualizer -->
                        <canvas id="visualizer" width="500" height="100"></canvas>
                        
                        <audio id="audio" preload="auto"></audio>

                        <!-- Progress bar + time -->
                        <div class="progress-container">
                            <span id="current-time">0:00</span>
                            <input type="range" id="progress-bar" value="0" step="0.1">
                            <span id="duration">0:00</span>
                        </div>

                        <!-- Controls row with buttons AND volume slider -->
                        <div class="controls-row">
                            <div class="controls">
                                <button id="prev" class="control-btn">⏮</button>
                                <button id="play-pause" class="control-btn play">▶</button>
                                <button id="next" class="control-btn">⏭</button>
                            </div>
                            
                            <div class="volume-container">
                                <span>🔊</span>
                                <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.5">
                            </div>
                        </div>

                        <div class="playlist">
                            <h3>playlist</h3>
                            <ul id="playlist"></ul>
                        </div>
                    </div>
                </div>

                <div class="note-card">
                    <p>just existing.</p>
                </div>
            </div>
        </section>

        <!-- ABOUT SECTION -->
        <section id="about">
            <h1 class="section-title">about</h1>
            <p class="section-intro">late nights, old riffs, quiet corners.</p>

            <!-- GUESTBOOK -->
            <div class="guestbook">
                <h2 class="section-subtitle">leave a note</h2>
                <div id="guestbook-entries" class="guestbook-entries"></div>
                <form id="guestbook-form" class="guestbook-form">
                    <input type="text" id="guest-name" placeholder="your name" required>
                    <textarea id="guest-message" placeholder="message" required></textarea>
                    <button type="submit">send</button>
                </form>
            </div>
        </section>
    </main>

    <footer>
        <p>szur999 // 六</p>
    </footer>

    <!-- No dragscroll library -->
    <script src="script.js"></script>
</body>
</html>
